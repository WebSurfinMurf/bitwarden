# GitLab-centric deploy for bitwarden (Vaultwarden).
#
# Source of truth is GitHub. GitLab Community Edition cannot pull-mirror
# (Premium-only), so a weekly *scheduled* `sync` job re-checks GitHub's `main`
# into GitLab; that push then triggers `deploy`. Nobody runs `docker compose`
# by hand — pushing to GitHub (and the weekly sync) is what ships changes.
#
# The shell runner (tags: shell/linuxserver/administrator) runs as root, but the
# git + docker + secrets all live with the `administrator` user (HOME, SSH keys,
# docker group, secrets file). Root has no passwordless SSH to administrator, so
# jobs drop privileges with `sudo -u administrator -H bash -lc '...'` (root sudoes
# without a password; -H sets HOME=/home/administrator so deploy.sh resolves
# $HOME/projects/secrets/bitwarden.env and the docker compose env_file correctly).
# GIT_STRATEGY is none because jobs operate on the host clone / scratch clone, not
# on a runner-side checkout.

stages:
  - sync
  - deploy
  - test

variables:
  GIT_STRATEGY: none
  RUN_AS_ADMIN: "sudo -u administrator -H bash -lc"
  PROJECT_DIR: /home/administrator/projects/bitwarden

# Weekly poll: pull GitHub -> push GitLab (poor-man's pull mirror).
# Runs ONLY in the scheduled pipeline (Sunday 05:00 America/New_York).
sync:
  stage: sync
  tags: [shell, linuxserver, administrator]
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
  script:
    - $RUN_AS_ADMIN "$PROJECT_DIR/scripts/mirror-from-github.sh"

# Deploy on any push to main (including the push that `sync` produces) and on
# manual web/API runs (used to deploy on demand).
deploy:
  stage: deploy
  tags: [shell, linuxserver, administrator]
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == "main"'
    - if: '$CI_PIPELINE_SOURCE == "web"'
    - if: '$CI_PIPELINE_SOURCE == "api"'
  script:
    - $RUN_AS_ADMIN "cd $PROJECT_DIR && git pull origin main && ./deploy.sh"
  environment:
    name: production
    url: https://bitwarden.ai-servicers.com

# Post-deploy health check against the public endpoint.
test:
  stage: test
  tags: [shell, linuxserver, administrator]
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == "main"'
    - if: '$CI_PIPELINE_SOURCE == "web"'
    - if: '$CI_PIPELINE_SOURCE == "api"'
  script:
    - sleep 8  # let the recreated container settle
    - $RUN_AS_ADMIN "$PROJECT_DIR/scripts/healthcheck.sh"
  needs: [deploy]
